version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: aitranslate-backend
    env_file:
      - ./backend/.env
    ports:
      - "8090:8090"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: aitranslate-frontend
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8090
    ports:
      - "3040:3040"
    depends_on:
      - backend
    restart: unless-stopped
