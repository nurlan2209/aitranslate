syntax = "proto3";

package realtime;

enum SourceLanguage {
  UNSPECIFIED = 0;
  KAZAKH = 1;
  RUSSIAN = 2;
  ENGLISH = 3;
}

enum LanguageMode {
  LANGUAGE_MODE_UNSPECIFIED = 0;
  AUTO = 1;
  MANUAL = 2;
}

message AudioChunk {
  bytes pcm_s16le = 1;
  uint32 sample_rate = 2;
}

message SetLanguageMode {
  LanguageMode mode = 1;
  SourceLanguage manual_lang = 2;
}

message SetGlossary {
  repeated string terms = 1;
}

message GetSettings {}

message ClientMessage {
  oneof payload {
    AudioChunk audio_chunk = 1;
    SetLanguageMode set_language_mode = 2;
    SetGlossary set_glossary = 3;
    GetSettings get_settings = 4;
  }
}

message SettingsState {
  LanguageMode language_mode = 1;
  SourceLanguage manual_source_lang = 2;
  string stt_model_lang = 3;
  repeated string available_stt_models = 4;
  repeated string custom_glossary_terms = 5;
  string warning = 6;
}

message RecognizedEvent {
  string original = 1;
  SourceLanguage detected_language = 2;
}

message TranslatedEvent {
  string original = 1;
  SourceLanguage detected_language = 2;
  string ru = 3;
  string en = 4;
  string kk = 5;
}

message ErrorEvent {
  string message = 1;
}

message ServerMessage {
  oneof payload {
    SettingsState settings_state = 1;
    RecognizedEvent recognized = 2;
    TranslatedEvent translated = 3;
    ErrorEvent error = 4;
  }
}

service RealtimePipeline {
  rpc Stream (stream ClientMessage) returns (stream ServerMessage);
}
