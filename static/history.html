<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>История разговоров</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(11, 21, 38, 0.92);
      --stroke: rgba(148, 163, 184, 0.24);
      --text: #e2e8f0;
      --muted: #93a5be;
      --incoming: rgba(16, 36, 64, 0.9);
      --outgoing: rgba(22, 65, 117, 0.9);
      --session: rgba(15, 28, 50, 0.9);
      --session-active: rgba(28, 67, 120, 0.95);
      --shadow: 0 12px 34px rgba(2, 6, 23, 0.36);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(1100px 560px at 95% -8%, rgba(59, 130, 246, 0.15), transparent 58%), var(--bg);
      color: var(--text);
      font-family: "Manrope", "Segoe UI", system-ui, sans-serif;
    }

    .app {
      max-width: 1280px;
      margin: 0 auto;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      padding: 14px;
    }

    .topbar {
      border: 1px solid var(--stroke);
      background: var(--panel);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .title {
      margin-right: auto;
      font-size: 15px;
      color: #d7e8ff;
      letter-spacing: .02em;
    }

    .badge {
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.34);
      padding: 4px 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .btn {
      border: 1px solid rgba(148, 163, 184, 0.34);
      border-radius: 999px;
      padding: 7px 12px;
      background: rgba(15, 23, 42, 0.62);
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }

    .layout {
      min-height: 0;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 12px;
    }

    .sessions {
      min-height: 0;
      border: 1px solid var(--stroke);
      background: rgba(8, 14, 24, 0.72);
      border-radius: 16px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .sessions-head {
      padding: 12px 12px 8px;
      font-size: 12px;
      color: #b5cced;
      text-transform: uppercase;
      letter-spacing: .06em;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    }

    #sessionsList {
      overflow: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .session-item {
      border: 1px solid rgba(148, 163, 184, 0.28);
      background: var(--session);
      border-radius: 12px;
      padding: 10px;
      width: 100%;
      text-align: left;
      font: inherit;
      color: var(--text);
      cursor: pointer;
      transition: border-color 140ms ease, background 140ms ease;
    }

    .session-item.active {
      border-color: rgba(125, 187, 255, 0.62);
      background: var(--session-active);
    }

    .session-title {
      font-size: 13px;
      color: #e4efff;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .session-meta {
      font-size: 12px;
      color: #b9cde8;
      display: flex;
      gap: 8px;
    }

    .chat {
      min-height: 0;
      border: 1px solid var(--stroke);
      background: rgba(8, 14, 24, 0.72);
      border-radius: 16px;
      overflow: auto;
      box-shadow: var(--shadow);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty {
      margin: auto;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .row {
      display: flex;
      width: 100%;
    }

    .row.outgoing { justify-content: flex-end; }
    .row.incoming { justify-content: flex-start; }

    .bubble {
      width: min(78%, 860px);
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      padding: 10px 12px;
      box-shadow: 0 8px 22px rgba(2, 6, 23, 0.3);
      line-height: 1.38;
    }

    .bubble.outgoing {
      background: linear-gradient(145deg, rgba(22, 65, 117, 0.94), var(--outgoing));
    }

    .bubble.incoming {
      background: linear-gradient(145deg, rgba(16, 36, 64, 0.92), var(--incoming));
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
      font-size: 11px;
      color: #bfd5f6;
      text-transform: uppercase;
      letter-spacing: .04em;
      font-weight: 700;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.42);
      padding: 2px 8px;
      font-size: 10px;
      color: #d7e6ff;
    }

    .text {
      font-size: 17px;
      font-weight: 700;
      color: #edf4ff;
      word-break: break-word;
    }

    .trans-line {
      display: grid;
      grid-template-columns: 42px 1fr;
      align-items: baseline;
      gap: 8px;
      margin-top: 6px;
    }

    .lang {
      color: #93c5fd;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .val {
      color: #dfebff;
      font-size: 16px;
      font-weight: 650;
      word-break: break-word;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: 220px 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div class="title">История разговоров (по сессиям)</div>
      <span id="sessionCount" class="badge">0 сессий</span>
      <span id="messageCount" class="badge">0 сообщений</span>
      <button id="clearBtn" class="btn">Очистить</button>
      <a href="/" class="btn">К оверлею</a>
    </section>
    <section class="layout">
      <aside class="sessions">
        <div class="sessions-head">Сессии</div>
        <div id="sessionsList"></div>
      </aside>
      <section id="chat" class="chat"></section>
    </section>
  </main>

  <script>
    const els = {
      sessionsList: document.getElementById("sessionsList"),
      sessionCount: document.getElementById("sessionCount"),
      messageCount: document.getElementById("messageCount"),
      chat: document.getElementById("chat"),
      clearBtn: document.getElementById("clearBtn"),
    };

    const state = {
      sessions: [],
      selectedSessionId: "",
      sessionsSig: "",
      messagesSig: "",
    };

    function esc(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function fmtDateTime(tsMs) {
      if (!tsMs) return "--.--.---- --:--";
      const d = new Date(tsMs);
      const dd = String(d.getDate()).padStart(2, "0");
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const yy = d.getFullYear();
      const hh = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      return `${dd}.${mm}.${yy} ${hh}:${mi}`;
    }

    function fmtTime(tsMs) {
      if (!tsMs) return "--:--:--";
      const d = new Date(tsMs);
      return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}:${String(d.getSeconds()).padStart(2, "0")}`;
    }

    function preferredOrder(sourceLang) {
      if (sourceLang === "kazakh") return ["RU", "EN", "KK"];
      if (sourceLang === "russian") return ["KK", "EN", "RU"];
      if (sourceLang === "english") return ["KK", "RU", "EN"];
      return ["RU", "EN", "KK"];
    }

    function renderSessions() {
      els.sessionCount.textContent = `${state.sessions.length} сессий`;
      els.sessionsList.innerHTML = "";

      if (!state.sessions.length) {
        els.sessionsList.innerHTML = `<div class="empty">Сессии отсутствуют</div>`;
        return;
      }

      for (const s of state.sessions) {
        const active = s.session_id === state.selectedSessionId ? "active" : "";
        const item = document.createElement("button");
        item.type = "button";
        item.className = `session-item ${active}`;
        item.innerHTML = `
          <div class="session-title">Сессия ${esc(fmtDateTime(s.session_started_ms || s.first_ts_ms))}</div>
          <div class="session-meta">
            <span>${Number(s.messages || 0)} фраз</span>
            <span>${esc(fmtTime(s.last_ts_ms))}</span>
          </div>
        `;
        item.addEventListener("click", async () => {
          if (state.selectedSessionId === s.session_id) return;
          state.selectedSessionId = s.session_id;
          state.messagesSig = "";
          renderSessions();
          await loadMessages();
        });
        els.sessionsList.appendChild(item);
      }
    }

    function renderMessages(items) {
      const signature = items.length ? `${items.length}:${items[items.length - 1].id}` : "0";
      if (signature === state.messagesSig) return;
      state.messagesSig = signature;

      const nearBottom = (els.chat.scrollHeight - els.chat.scrollTop - els.chat.clientHeight) < 120;
      els.chat.innerHTML = "";
      els.messageCount.textContent = `${items.length} сообщений`;

      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = state.selectedSessionId ? "В этой сессии пока нет сообщений" : "Выберите сессию слева";
        els.chat.appendChild(empty);
        return;
      }

      for (const item of items) {
        const outgoing = document.createElement("div");
        outgoing.className = "row outgoing";
        outgoing.innerHTML = `
          <article class="bubble outgoing">
            <div class="meta">
              <span class="pill">исходник</span>
              <span>${esc(item.source_lang || "unknown")}</span>
              <span>${esc(fmtTime(item.ts_ms))}</span>
            </div>
            <div class="text">${esc(item.original || "")}</div>
          </article>
        `;
        els.chat.appendChild(outgoing);

        const order = preferredOrder(String(item.source_lang || "").toLowerCase());
        const dict = { RU: item.ru || "", EN: item.en || "", KK: item.kk || "" };

        const incoming = document.createElement("div");
        incoming.className = "row incoming";
        incoming.innerHTML = `
          <article class="bubble incoming">
            <div class="meta">
              <span class="pill">переводы</span>
              <span>${esc(fmtTime(item.ts_ms))}</span>
            </div>
            ${order.map((lang) => `
              <div class="trans-line">
                <span class="lang">${lang}</span>
                <span class="val">${esc(dict[lang])}</span>
              </div>
            `).join("")}
          </article>
        `;
        els.chat.appendChild(incoming);
      }

      if (nearBottom) {
        els.chat.scrollTop = els.chat.scrollHeight;
      }
    }

    async function loadSessions() {
      try {
        const response = await fetch("/api/history/sessions?limit=300", { cache: "no-store" });
        if (!response.ok) return false;
        const data = await response.json();
        const sessions = Array.isArray(data.sessions) ? data.sessions : [];
        const newSig = sessions.map((s) => `${s.session_id}:${s.messages}:${s.last_ts_ms}`).join("|");
        const hadSelected = state.selectedSessionId;

        state.sessions = sessions;
        if (!sessions.length) {
          state.selectedSessionId = "";
        } else if (!sessions.some((s) => s.session_id === state.selectedSessionId)) {
          state.selectedSessionId = sessions[0].session_id;
        }

        const selectionChanged = hadSelected !== state.selectedSessionId;
        if (newSig !== state.sessionsSig || selectionChanged) {
          state.sessionsSig = newSig;
          renderSessions();
        }
        return selectionChanged;
      } catch (_) {
        return false;
      }
    }

    async function loadMessages() {
      if (!state.selectedSessionId) {
        renderMessages([]);
        return;
      }
      try {
        const sid = encodeURIComponent(state.selectedSessionId);
        const response = await fetch(`/api/history?session_id=${sid}&limit=1000`, { cache: "no-store" });
        if (!response.ok) return;
        const data = await response.json();
        renderMessages(Array.isArray(data.items) ? data.items : []);
      } catch (_) {
        // no-op
      }
    }

    async function clearHistory() {
      try {
        await fetch("/api/history/clear", { method: "POST" });
      } catch (_) {
        // no-op
      }
      state.sessions = [];
      state.selectedSessionId = "";
      state.sessionsSig = "";
      state.messagesSig = "";
      renderSessions();
      renderMessages([]);
      await refresh();
    }

    async function refresh() {
      const selectionChanged = await loadSessions();
      if (selectionChanged) {
        state.messagesSig = "";
      }
      await loadMessages();
    }

    els.clearBtn.addEventListener("click", clearHistory);
    refresh();
    setInterval(refresh, 1500);
  </script>
</body>
</html>
